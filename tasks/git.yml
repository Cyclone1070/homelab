- name: Install Git
  ansible.builtin.dnf:
    name: git
    state: present

- name: Generate SSH key for GitHub
  become: true
  become_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
  ansible.builtin.openssh_keypair:
    path: "~/.ssh/id_github"
    type: ed25519
    state: present
  register: github_ssh_key

- name: Configure Git Global Name
  become: true
  become_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
  community.general.git_config:
    name: user.name
    value: "Huy Hoang Mai"
    scope: global

- name: Configure Git Global Email
  become: true
  become_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
  community.general.git_config:
    name: user.email
    value: "hoangmai1070@gmail.com"
    scope: global

- name: Add SSH key to GitHub via API
  delegate_to: localhost
  become: false
  ansible.builtin.uri:
    url: "https://api.github.com/user/keys"
    method: POST
    headers:
      Authorization: "token {{ github_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      title: "Homelab Key ({{ inventory_hostname }})"
      key: "{{ github_ssh_key.public_key }}"
    status_code: [201, 422]
  register: github_api_result
  changed_when: "github_api_result.status == 201"

- name: Add GitHub to known_hosts
  become: true
  become_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
  ansible.builtin.known_hosts:
    name: github.com
    key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 github.com') }}"
    path: "~/.ssh/known_hosts"
    state: present

- name: Configure SSH to use id_github for GitHub
  become: true
  become_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
  ansible.builtin.blockinfile:
    path: "~/.ssh/config"
    create: true
    mode: '0600'
    block: |
      Host github.com
        HostName github.com
        User git
        IdentityFile ~/.ssh/id_github
        IdentitiesOnly yes
