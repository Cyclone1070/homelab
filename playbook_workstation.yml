---
- name: Workstation Configuration
  hosts: all

  roles:
    - role: git
      tags: git
    - role: shell
      tags: shell
    - role: languages
      tags: languages
    - role: desktop
      tags: desktop
    - role: apps
      tags: apps

  post_tasks:
    - name: Run final state reconciliation
      ansible.builtin.include_role:
        name: cleanup
        apply:
          tags: [always, cleanup]
      tags: [always, cleanup]
