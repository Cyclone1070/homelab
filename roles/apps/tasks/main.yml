---
- name: Load OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_facts['distribution'] }}.yml"
    - "{{ ansible_facts['os_family'] }}.yml"
    - "default.yml"

- name: Enable Ghostty COPR (Fedora)
  become: true
  community.general.copr:
    name: pgdev/ghostty
    state: enabled
  when: ansible_facts['distribution'] == 'Fedora'

- name: Enable Sunshine Beta COPR (Fedora)
  become: true
  community.general.copr:
    name: lizardbyte/beta
    state: enabled
  when: ansible_facts['distribution'] == 'Fedora'

- name: Enable RPM Fusion Free Repository
  become: true
  ansible.builtin.package:
    name: "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
    state: present
    disable_gpg_check: true
  when: ansible_facts['os_family'] == 'RedHat'

- name: Enable RPM Fusion Nonfree Repository
  become: true
  ansible.builtin.package:
    name: "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
    state: present
    disable_gpg_check: true
  when: ansible_facts['os_family'] == 'RedHat'

- name: Swap to full ffmpeg and install Intel media drivers
  become: true
  ansible.builtin.dnf:
    name:
      - ffmpeg
      - intel-media-driver
      - libva-utils
    state: present
    allowerasing: true
  when: ansible_facts['os_family'] == 'RedHat'

- name: Configure udev rule for Sunshine uinput access
  become: true
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/85-sunshine.rules
    content: 'KERNEL=="uinput", SUBSYSTEM=="misc", OPTIONS+="static_node=uinput", TAG+="uaccess"'
    mode: '0644'

- name: Open Sunshine firewall ports
  become: true
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - 47984-47990/tcp
    - 48010/tcp
    - 47998-48000/udp
    - 48002/udp
    - 48010/udp
  when: ansible_facts['os_family'] == 'RedHat'

- name: Add Antigravity RPM Repository
  become: true
  ansible.builtin.yum_repository:
    name: antigravity-rpm
    description: Antigravity RPM Repository
    baseurl: https://us-central1-yum.pkg.dev/projects/antigravity-auto-updater-dev/antigravity-rpm
    enabled: true
    gpgcheck: false
  when: ansible_facts['os_family'] == 'RedHat'

- name: Add Brave Browser Repository
  become: true
  ansible.builtin.yum_repository:
    name: brave-browser
    description: Brave Browser Repository
    baseurl: https://brave-browser-rpm-release.s3.brave.com/x86_64/
    enabled: true
    gpgcheck: true
    gpgkey: https://brave-browser-rpm-release.s3.brave.com/brave-core.asc
  when: ansible_facts['os_family'] == 'RedHat'

- name: Install Desktop Applications
  become: true
  ansible.builtin.package:
    name: "{{ desktop_packages }}"
    state: present

- name: Create Desktop Config Symlinks
  ansible.builtin.file:
    src: "{{ dotfiles_dest }}/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop: "{{ desktop_links }}"

- name: Ensure Sunshine user service is disabled (manual start only)
  ansible.builtin.systemd:
    name: app-dev.lizardbyte.app.Sunshine
    enabled: false
    scope: user

- name: Add user to input group for Sunshine
  become: true
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    groups: input
    append: true

- name: Create Sunshine systemd override directory
  ansible.builtin.file:
    path: "~/.config/systemd/user/app-dev.lizardbyte.app.Sunshine.service.d"
    state: directory
    mode: '0755'

- name: Configure Sunshine environment overrides
  ansible.builtin.copy:
    dest: "~/.config/systemd/user/app-dev.lizardbyte.app.Sunshine.service.d/env.conf"
    content: |
      [Service]
      Environment=WAYLAND_DISPLAY=wayland-0
      Environment=XDG_RUNTIME_DIR=/run/user/{{ ansible_facts['user_id'] }}
    mode: '0644'

- name: Discover Tailscale domain
  ansible.builtin.shell: set -o pipefail && tailscale status --json | grep -oE "[a-z0-9]+\.ts\.net" | head -n 1
  args:
    executable: /bin/bash
  register: tailnet_domain
  changed_when: false

- name: Configure Sunshine CSRF allowed origins
  ansible.builtin.lineinfile:
    path: "~/.config/sunshine/sunshine.conf"
    regexp: '^csrf_allowed_origins ='
    line: "csrf_allowed_origins = https://{{ ansible_facts['hostname'] }}:47990,https://localhost:47990,https://{{ ansible_facts['tailscale0']['ipv4']['address'] }}:47990,https://{{ ansible_facts['hostname'] }}.{{ tailnet_domain.stdout }}:47990"
    create: true
    mode: '0644'

- name: Include aria2-engine role
  ansible.builtin.include_role:
    name: aria2-engine
  tags: [apps, aria2-engine]
