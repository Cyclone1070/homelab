---
- name: Ensure stable Wolf UUID exists
  ansible.builtin.shell: |
    if [ ! -f /etc/wolf/cfg/uuid.txt ]; then
      cat /proc/sys/kernel/random/uuid > /etc/wolf/cfg/uuid.txt
    fi
    cat /etc/wolf/cfg/uuid.txt
  register: wolf_uuid_output
  become: true
  changed_when: false

- name: Set Wolf UUID fact
  ansible.builtin.set_fact:
    wolf_uuid: "{{ wolf_uuid_output.stdout | trim }}"

- name: Create Wolf persistent data directory
  ansible.builtin.file:
    path: "/etc/wolf/profile-data/user/WolfSteam"
    state: directory
    mode: '0777'
    recurse: false
  become: true

- name: Purge ghost input nodes from host
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /dev/input/event14
    - /dev/input/event15
    - /dev/input/event16
    - /dev/input/js0
    - /dev/input/js1
    - /dev/input/mouse1
  become: true

- name: Create Wolf config directory
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  become: true
  loop:
    - /etc/wolf/cfg
    - /etc/wolf/run

- name: Deploy Wolf udev rules
  ansible.builtin.copy:
    content: |
      KERNEL=="uinput", SUBSYSTEM=="misc", OPTIONS+="static_node=uinput", MODE="0660", GROUP="input"
      KERNEL=="uhid", SUBSYSTEM=="misc", MODE="0660", GROUP="input"
    dest: /etc/udev/rules.d/85-wolf.rules
    mode: '0644'
  become: true
  notify: "gaming : Reload udev rules"

- name: Harvest existing paired clients from host
  ansible.builtin.shell: |
    set -o pipefail
    python3 -c '
    import sys
    try:
        with open("/etc/wolf/cfg/config.toml", "r") as f:
            content = f.read()
            pattern = "[[paired_clients]]"
            start = content.find(pattern)
            if start != -1:
                import re
                # Search after the current section header
                end_match = re.search(r"\n\s*\[+", content[start + len(pattern):])
                if end_match:
                    end = start + len(pattern) + end_match.start()
                    print(content[start:end].strip())
                else:
                    print(content[start:].strip())
    except:
        pass
    '
  register: paired_clients_harvest
  become: true
  changed_when: false

- name: Set paired clients fact
  ansible.builtin.set_fact:
    harvested_clients: "{{ paired_clients_harvest.stdout }}"

- name: Stage new Wolf configuration
  ansible.builtin.template:
    src: wolf.config.toml.j2
    dest: /etc/wolf/cfg/config.toml.ansible
    mode: '0644'
  become: true
  changed_when: false

- name: Compare current and new configuration logically
  ansible.builtin.shell: |
    python3 -c '
    import tomllib
    import sys
    import json

    try:
        with open("/etc/wolf/cfg/config.toml", "rb") as f1, open("/etc/wolf/cfg/config.toml.ansible", "rb") as f2:
            c1 = tomllib.load(f1)
            c2 = tomllib.load(f2)
            if c1 == c2:
                sys.exit(0)
            else:
                import difflib
                s1 = json.dumps(c1, sort_keys=True, indent=2)
                s2 = json.dumps(c2, sort_keys=True, indent=2)
                print("\n".join(difflib.unified_diff(s1.splitlines(), s2.splitlines())))
                sys.exit(1)
    except Exception as e:
        print(f"Error: {e}")
        sys.exit(1)
    '
  register: config_diff
  failed_when: false
  changed_when: config_diff.rc != 0
  become: true

- name: Deploy Wolf configuration
  ansible.builtin.copy:
    src: /etc/wolf/cfg/config.toml.ansible
    dest: /etc/wolf/cfg/config.toml
    remote_src: true
    mode: '0644'
  when: config_diff.rc != 0
  become: true
  notify: "gaming : Restart Wolf"

- name: Deploy Wolf Quadlet container definition
  ansible.builtin.template:
    src: wolf.container.j2
    dest: /etc/containers/systemd/wolf.container
    mode: '0644'
  become: true
  notify:
    - "gaming : Reload systemd daemon"
    - "gaming : Restart Wolf"

- name: Purge zombie containers before starting Wolf
  ansible.builtin.shell: |
    set -o pipefail
    {% raw %}
    # Stop and remove any container containing 'wolf' (case-insensitive)
    for container in $(podman ps -a --format '{{.Names}}' | grep -i wolf); do
      podman stop "$container" || true
      podman rm -f "$container" || true
    done
    {% endraw %}
  become: true
  changed_when: false

- name: Flush handlers to ensure systemd is reloaded
  ansible.builtin.meta: flush_handlers

- name: Ensure Wolf service is enabled and started
  ansible.builtin.systemd:
    name: wolf
    state: started
    enabled: true
  become: true

- name: Open Wolf firewall ports
  ansible.builtin.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  become: true
  loop:
    - 47984/tcp
    - 47989/tcp
    - 47999/udp
    - 48010/tcp
    - 48100/udp
    - 48200/udp
  when: ansible_facts['os_family'] == 'RedHat'
