---
- name: Reload udev rules
  become: true
  ansible.builtin.shell: udevadm control --reload-rules && udevadm trigger

- name: Reload systemd daemon
  become: true
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart Wolf
  become: true
  ansible.builtin.systemd:
    name: wolf
    state: restarted
