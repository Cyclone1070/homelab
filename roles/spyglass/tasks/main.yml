---
- name: Load spyglass secrets
  ansible.builtin.include_vars: secrets.yml

- name: Ensure Quadlet directory exists
  ansible.builtin.file:
    path: "~/.config/containers/systemd"
    state: directory
    mode: '0755'

- name: Pull latest Spyglass images
  containers.podman.podman_image:
    name: "{{ item }}"
    force: true
  loop:
    - docker.io/cyclone1070/spyglass-backend:latest
    - docker.io/cloudflare/cloudflared:latest
  register: images_pull

- name: Deploy Spyglass Kubernetes Manifest
  ansible.builtin.template:
    src: spyglass.yaml.j2
    dest: "~/.config/containers/systemd/spyglass.yaml"
    mode: '0644'
  register: kube_manifest

- name: Deploy Spyglass Kube Quadlet
  ansible.builtin.template:
    src: spyglass.kube.j2
    dest: "~/.config/containers/systemd/spyglass.kube"
    mode: '0644'
  register: kube_quadlet

- name: Reload systemd and restart services
  ansible.builtin.systemd:
    name: spyglass
    state: restarted
    enabled: true
    scope: user
    daemon_reload: true
  when: images_pull.changed or kube_manifest.changed or kube_quadlet.changed

- name: Ensure Spyglass Pod is started
  ansible.builtin.systemd:
    name: spyglass
    state: started
    enabled: true
    scope: user
