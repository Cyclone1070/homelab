---
- name: Load OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_facts['distribution'] }}.yml"
    - "{{ ansible_facts['os_family'] }}.yml"
    - "default.yml"

- name: Install Git
  become: true
  ansible.builtin.package:
    name: "{{ git_packages }}"
    state: present

- name: Generate SSH key for GitHub
  ansible.builtin.openssh_keypair:
    path: "~/.ssh/id_github"
    type: ed25519
    state: present
  register: github_ssh_key

- name: Configure Git Global Name
  community.general.git_config:
    name: user.name
    value: "Huy Hoang Mai"
    scope: global

- name: Configure Git Global Email
  community.general.git_config:
    name: user.email
    value: "hoangmai1070@gmail.com"
    scope: global

- name: Add SSH key to GitHub via API
  delegate_to: localhost
  become: false
  ansible.builtin.uri:
    url: "https://api.github.com/user/keys"
    method: POST
    headers:
      Authorization: "token {{ github_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      title: "Homelab Key ({{ ansible_facts['hostname'] }})"
      key: "{{ github_ssh_key.public_key }}"
    status_code: [201, 422]
  register: github_api_result
  changed_when: "github_api_result.status == 201"

- name: Check if GitHub is in known_hosts
  ansible.builtin.command: ssh-keygen -F github.com
  register: github_in_known_hosts
  changed_when: false
  failed_when: false

- name: Add GitHub to known_hosts
  ansible.builtin.known_hosts:
    name: github.com
    key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 github.com') }}"
    path: "~/.ssh/known_hosts"
    state: present
  when: github_in_known_hosts.rc != 0

- name: Configure SSH to use id_github for GitHub
  ansible.builtin.blockinfile:
    path: "~/.ssh/config"
    create: true
    mode: '0600'
    block: |
      Host github.com
        HostName github.com
        User git
        IdentityFile ~/.ssh/id_github
        IdentitiesOnly yes
