---
# 1. Harvest current desired state surgically from roles in the current play
- name: Load all role defaults (including dependencies and sub-files)
  ansible.builtin.include_vars:
    dir: "{{ playbook_dir }}/roles/{{ item }}/defaults"
  loop: "{{ ansible_role_names }}"
  when: (playbook_dir + '/roles/' + item + '/defaults') is directory

- name: Load all role vars (including secrets and overrides)
  ansible.builtin.include_vars:
    dir: "{{ playbook_dir }}/roles/{{ item }}/vars"
  loop: "{{ ansible_role_names }}"
  when: (playbook_dir + '/roles/' + item + '/vars') is directory

- name: Aggregate all managed package variables
  set_fact:
    cleanup_managed_packages: >-
      {{ hostvars[inventory_hostname].keys()
         | select('search', cleanup_package_vars_suffix)
         | map('extract', hostvars[inventory_hostname])
         | flatten | unique }}

- name: Aggregate all managed repository variables
  set_fact:
    cleanup_managed_repos: "{{ repos_raw | from_json }}"
  vars:
    repos_raw: >-
      {% set repos = [] %}
      {% for key in hostvars[inventory_hostname].keys() | select('search', cleanup_repo_vars_suffix) %}
        {% set val = hostvars[inventory_hostname][key] %}
        {% if val is mapping %}{% set _ = repos.extend(val.keys() | list) %}
        {% else %}{% set _ = repos.extend(val | list) %}{% endif %}
      {% endfor %}
      {{ repos | unique | to_json }}

# 2. Read previous state from the remote machine (Isolated by Playbook Name)
- name: Set state file path fact
  set_fact:
    cleanup_state_file: "~/.config/ansible/{{ (ansible_play_name | lower | replace(' ', '-')) }}-installed.yml"

- name: Ensure ansible config directory exists
  ansible.builtin.file:
    path: "~/.config/ansible"
    state: directory
    mode: '0755'

- name: Check if state file exists
  ansible.builtin.stat:
    path: "{{ cleanup_state_file }}"
  register: installed_state_file

- name: Load previous state
  ansible.builtin.slurp:
    src: "{{ cleanup_state_file }}"
  register: installed_state_b64
  when: installed_state_file.stat.exists

- name: Parse previous state
  set_fact:
    previous_state: "{{ (installed_state_b64.content | b64decode | from_yaml) if installed_state_file.stat.exists else {'installed_packages': [], 'installed_repos': []} }}"

# 3. Calculate orphans (in previous state but not in current desired state)
- name: Calculate orphans
  set_fact:
    packages_to_remove: "{{ previous_state.installed_packages | default([]) | difference(cleanup_managed_packages) }}"
    repos_to_remove: "{{ previous_state.installed_repos | default([]) | difference(cleanup_managed_repos) }}"

# 4. Remove orphans
- name: Remove orphaned .repo files
  ansible.builtin.file:
    path: "/etc/yum.repos.d/{{ item }}.repo"
    state: absent
  loop: "{{ repos_to_remove }}"
  become: true
  when: repos_to_remove | length > 0

- name: Remove orphaned packages
  ansible.builtin.package:
    name: "{{ item }}"
    state: absent
  loop: "{{ packages_to_remove }}"
  become: true
  failed_when: false
  when: packages_to_remove | length > 0

- name: Perform deep dependency cleanup (Fedora only)
  ansible.builtin.dnf5:
    autoremove: true
  become: true
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - packages_to_remove | length > 0

# 5. Save current desired state to become the previous state for next run
- name: Save current state
  ansible.builtin.copy:
    dest: "{{ cleanup_state_file }}"
    content: |
      ---
      installed_packages:
      {{ cleanup_managed_packages | to_nice_yaml | indent(2, first=True) }}
      installed_repos:
      {{ cleanup_managed_repos | to_nice_yaml | indent(2, first=True) }}
    mode: '0644'
