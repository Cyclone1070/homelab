---
- name: Load OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_distribution }}.yml"
    - "{{ ansible_os_family }}.yml"
    - "default.yml"

- name: Ensure SSH key exists on local machine
  delegate_to: localhost
  become: false
  ansible.builtin.command:
    cmd: "ssh-keygen -q -t ed25519 -N '' -f ~/.ssh/id_ed25519"
    creates: "~/.ssh/id_ed25519"

- name: Get Tailscale OAuth token
  delegate_to: localhost
  become: false
  ansible.builtin.uri:
    url: "https://api.tailscale.com/api/v2/oauth/token"
    method: POST
    user: "{{ tailscale_client_id }}"
    password: "{{ tailscale_client_secret }}"
    force_basic_auth: true
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
  register: oauth_token

- name: Discover Tailnet name from devices
  delegate_to: localhost
  become: false
  ansible.builtin.uri:
    url: "https://api.tailscale.com/api/v2/tailnet/-/devices"
    headers:
      Authorization: "Bearer {{ oauth_token.json.access_token }}"
  register: devices_list

- name: Set discovered tailnet fact
  ansible.builtin.set_fact:
    discovered_tailnet: "{{ devices_list.json.devices[0].name.split('.', 1)[1] }}"

- name: Enable passwordless sudo for user
  become: true
  ansible.builtin.copy:
    content: "{{ ansible_user | default(lookup('env', 'USER')) }} ALL=(ALL) NOPASSWD:ALL"
    dest: "/etc/sudoers.d/{{ ansible_user | default(lookup('env', 'USER')) }}"
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s

- name: Set hostname
  become: true
  ansible.builtin.hostname:
    name: "{{ target_hostname | default(ansible_facts['hostname']) }}"

- name: Ensure .ssh directory exists on server
  ansible.builtin.file:
    path: "/home/{{ ansible_user | default(lookup('env', 'USER')) }}/.ssh"
    state: directory
    mode: '0700'
    owner: "{{ ansible_user | default(lookup('env', 'USER')) }}"

- name: Deploy SSH public key
  become: true
  ansible.builtin.authorized_key:
    user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
    state: present
    key: "{{ lookup('file', item) }}"
  with_first_found:
    - "~/.ssh/id_ed25519.pub"
    - "~/.ssh/id_rsa.pub"
    - "~/.ssh/id_ecdsa.pub"

- name: Install Tailscale
  become: true
  ansible.builtin.package:
    name: "{{ bootstrap_packages }}"
    state: present

- name: Enable and start Tailscale service
  become: true
  ansible.builtin.systemd:
    name: tailscaled
    state: started
    enabled: true

- name: Check Tailscale status
  ansible.builtin.command: tailscale status --json
  register: tailscale_status_raw
  changed_when: false
  failed_when: false

- name: Join Tailscale network
  become: true
  ansible.builtin.command:
    cmd: "tailscale up --authkey={{ tailscale_client_secret }} --advertise-tags=tag:homelab --accept-routes"
  when:
    - tailscale_status_raw.stdout == "" or
      (tailscale_status_raw.stdout | from_json).MagicDNSSuffix | default('') != discovered_tailnet or
      'tag:homelab' not in (tailscale_status_raw.stdout | from_json).Self.Tags | default([])
  register: tailscale_join_result
  changed_when: tailscale_join_result.rc == 0

- name: Silence terminal login banners (Hushlogin)
  become: true
  become_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
  ansible.builtin.copy:
    content: ""
    dest: "~/.hushlogin"
    force: false
    mode: '0644'
