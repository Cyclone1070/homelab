---
- name: Load OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_facts['distribution'] }}.yml"
    - "{{ ansible_facts['os_family'] }}.yml"
    - "default.yml"

- name: Install GNOME Desktop Environment
  become: true
  ansible.builtin.package:
    name: "{{ desktop_environment_group }}"
    state: present

- name: Ensure default boot is Server Mode (Multi-User)
  become: true
  ansible.builtin.file:
    src: /lib/systemd/system/multi-user.target
    dest: /etc/systemd/system/default.target
    state: link
    force: true

- name: Enable GDM Automatic Login (Fedora 43 Gold Standard)
  become: true
  ansible.builtin.ini_file:
    path: /etc/gdm/custom.conf
    section: daemon
    option: "{{ item.key }}"
    value: "{{ item.value }}"
    no_extra_spaces: true
    mode: '0644'
  loop:
    - { key: "AutomaticLoginEnable", value: "true" }
    - { key: "AutomaticLogin", value: "cyc" }
    - { key: "DefaultSession", value: "gnome.desktop" }

- name: Synchronize PAM stack for Autologin
  become: true
  ansible.builtin.command: authselect select local with-silent-lastlog with-mdns4 --force
  changed_when: true

- name: Fix SELinux context for GDM configuration
  become: true
  ansible.builtin.command: restorecon -v /etc/gdm/custom.conf
  changed_when: false

- name: Create deon helper script
  become: true
  ansible.builtin.copy:
    dest: /usr/local/bin/deon
    mode: '0755'
    content: |
      #!/bin/bash
      echo "Switching to Graphical Mode (PC)..."
      sudo systemctl isolate graphical.target

- name: Create deoff helper script
  become: true
  ansible.builtin.copy:
    dest: /usr/local/bin/deoff
    mode: '0755'
    content: |
      #!/bin/bash
      echo "Switching to Server Mode (Headless)..."
      sudo systemctl isolate multi-user.target

- name: Enable GNOME Dark Mode
  community.general.dconf:
    key: "/org/gnome/desktop/interface/color-scheme"
    value: "'prefer-dark'"

- name: Set legacy GTK theme to Dark
  community.general.dconf:
    key: "/org/gnome/desktop/interface/gtk-theme"
    value: "'Adwaita-dark'"
