---
- name: Load OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_facts['distribution'] }}.yml"
    - "{{ ansible_facts['os_family'] }}.yml"
    - "default.yml"

- name: Install GNOME Desktop Environment
  become: true
  ansible.builtin.package:
    name: "{{ desktop_environment_group }}"
    state: present

- name: Ensure default boot is Server Mode (Multi-User)
  become: true
  ansible.builtin.file:
    src: /lib/systemd/system/multi-user.target
    dest: /etc/systemd/system/default.target
    state: link
    force: true

- name: Grant user permission for TTY and Video hardware
  become: true
  ansible.builtin.user:
    name: "{{ ansible_user | default(lookup('env', 'USER')) }}"
    groups: "video,tty"
    append: true

- name: Create deon helper script (Remote Ignition Capable)
  become: true
  ansible.builtin.copy:
    dest: /usr/local/bin/deon
    mode: '0755'
    content: |
      #!/bin/bash
      # deon: Remote/Local Desktop Ignition
      echo "Igniting GNOME session on TTY2..."

      # 1. Kill any existing session unit
      systemctl --user stop gnome-remote.scope 2>/dev/null

      # 2. Launch GNOME via systemd-run
      # We target /dev/tty2 to "force" it onto the physical monitor
      systemd-run --user --scope --unit=gnome-remote \
          --property="TTYPath=/dev/tty2" \
          --property="StandardInput=tty" \
          --property="StandardOutput=tty" \
          dbus-run-session gnome-session &

      echo "Session started. You can now connect via Moonlight/Sunshine."

- name: Create deoff helper script
  become: true
  ansible.builtin.copy:
    dest: /usr/local/bin/deoff
    mode: '0755'
    content: |
      #!/bin/bash
      # deoff: Remote/Local Desktop Shutdown
      echo "Extinguishing GNOME session..."
      systemctl --user stop gnome-remote.scope
      echo "Back to Server Mode."

- name: Enable GNOME Dark Mode
  community.general.dconf:
    key: "/org/gnome/desktop/interface/color-scheme"
    value: "'prefer-dark'"

- name: Set legacy GTK theme to Dark
  community.general.dconf:
    key: "/org/gnome/desktop/interface/gtk-theme"
    value: "'Adwaita-dark'"
