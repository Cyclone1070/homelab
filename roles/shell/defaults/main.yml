shell_dotfiles_repo: "git@github.com:Cyclone1070/dotfiles.git"
shell_dotfiles_dest: "~/repos/dotfiles"

shell_packages:
  - zsh
  - tmux
  - neovim
  - zoxide
  - lsd
  - util-linux-user
  - pipx
  - p7zip
  - p7zip-plugins
  - unar

shell_dotfiles_links:
  - { src: "zsh/.zshrc", dest: "~/.zshrc" }
  - { src: "zsh/.p10k.zsh", dest: "~/.p10k.zsh" }
  - { src: "tmux/.tmux.conf", dest: "~/.tmux.conf" }
  - { src: "tmux/.tmux", dest: "~/.tmux" }
  - { src: "nvim", dest: "~/.config/nvim" }
shell_dotfiles_dirs:
  - "~/repos"
  - "~/.config"
