- name: Install system packages
  become: true
  ansible.builtin.package:
    name: "{{ shell_packages }}"
    state: present

- name: Set Zsh as default shell
  become: true
  ansible.builtin.user:
    name: "{{ ansible_user | default(lookup('env', 'USER')) }}"
    shell: /usr/bin/zsh

- name: Ensure parent directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop: "{{ shell_dotfiles_dirs }}"

- name: Clone dotfiles repository
  ansible.builtin.git:
    repo: "{{ shell_dotfiles_repo }}"
    dest: "{{ shell_dotfiles_dest }}"
    update: true
    force: true
    accept_hostkey: true
    version: main

- name: Create dotfile symlinks
  ansible.builtin.file:
    src: "{{ shell_dotfiles_dest }}/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop: "{{ shell_dotfiles_links }}"

- name: Install aria2p via pipx
  community.general.pipx:
    name: aria2p
    state: present
