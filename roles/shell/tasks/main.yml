---
- name: Load OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_facts['distribution'] }}.yml"
    - "{{ ansible_facts['os_family'] }}.yml"
    - "default.yml"

- name: Install system packages
  become: true
  ansible.builtin.package:
    name: "{{ shell_packages }}"
    state: present

- name: Set Zsh as default shell
  become: true
  ansible.builtin.user:
    name: "{{ ansible_user | default(lookup('env', 'USER')) }}"
    shell: /usr/bin/zsh

- name: Install Oh My Zsh
  ansible.builtin.shell:
    cmd: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
    creates: "~/.oh-my-zsh"

- name: Check Oh My Zsh custom directory
  ansible.builtin.stat:
    path: "~/.oh-my-zsh/custom"
  register: omz_custom_stat

- name: Remove default Oh My Zsh custom directory
  ansible.builtin.file:
    path: "~/.oh-my-zsh/custom"
    state: absent
  when:
    - omz_custom_stat.stat.exists
    - not omz_custom_stat.stat.islnk

- name: Ensure parent directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop: "{{ dotfiles_dirs }}"

- name: Clone dotfiles repository
  ansible.builtin.git:
    repo: "{{ dotfiles_repo }}"
    dest: "{{ dotfiles_dest }}"
    update: true
    force: true
    accept_hostkey: true
    version: main

- name: Create dotfile symlinks
  ansible.builtin.file:
    src: "{{ dotfiles_dest }}/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop: "{{ dotfiles_links }}"

- name: Install aria2p via pipx
  community.general.pipx:
    name: aria2p
    state: present

