- name: Install system packages
  become: true
  ansible.builtin.package:
    name: "{{ shell_packages }}"
    state: present

- name: Set Zsh as default shell
  become: true
  ansible.builtin.user:
    name: "{{ ansible_user | default(lookup('env', 'USER')) }}"
    shell: /usr/bin/zsh

- name: Install Oh My Zsh
  ansible.builtin.shell:
    cmd: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
    creates: "~/.oh-my-zsh"

- name: Check Oh My Zsh custom directory
  ansible.builtin.stat:
    path: "~/.oh-my-zsh/custom"
  register: shell_omz_custom_stat

- name: Remove default Oh My Zsh custom directory
  ansible.builtin.file:
    path: "~/.oh-my-zsh/custom"
    state: absent
  when:
    - shell_omz_custom_stat.stat.exists
    - not shell_omz_custom_stat.stat.islnk

- name: Ensure parent directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop: "{{ shell_dotfiles_dirs }}"

- name: Clone dotfiles repository
  ansible.builtin.git:
    repo: "{{ shell_dotfiles_repo }}"
    dest: "{{ shell_dotfiles_dest }}"
    update: true
    force: true
    accept_hostkey: true
    version: main

- name: Create dotfile symlinks
  ansible.builtin.file:
    src: "{{ shell_dotfiles_dest }}/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop: "{{ shell_dotfiles_links }}"

- name: Install aria2p via pipx
  community.general.pipx:
    name: aria2p
    state: present
