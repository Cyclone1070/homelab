---
- name: Enable Ghostty COPR (Fedora)
  become: true
  ansible.builtin.command: dnf copr enable pgdev/ghostty -y
  when: ansible_facts['distribution'] == "Fedora"
  changed_when: false

- name: Install system packages
  become: true
  ansible.builtin.dnf:
    name: "{{ dotfiles_packages }}"
    state: present

- name: Set Zsh as default shell
  become: true
  ansible.builtin.user:
    name: "{{ ansible_user | default(lookup('env', 'USER')) }}"
    shell: /usr/bin/zsh

- name: Install Oh My Zsh
  become: true
  become_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
  ansible.builtin.shell:
    cmd: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
    creates: "~/.oh-my-zsh"

- name: Check Oh My Zsh custom directory
  become: true
  become_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
  ansible.builtin.stat:
    path: "~/.oh-my-zsh/custom"
  register: omz_custom_stat

- name: Remove default Oh My Zsh custom directory
  become: true
  become_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
  ansible.builtin.file:
    path: "~/.oh-my-zsh/custom"
    state: absent
  when:
    - omz_custom_stat.stat.exists
    - not omz_custom_stat.stat.islnk

- name: Ensure parent directories exist
  become: true
  become_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop: "{{ dotfiles_dirs }}"

- name: Clone dotfiles repository
  become: true
  become_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
  ansible.builtin.git:
    repo: "{{ dotfiles_repo }}"
    dest: "{{ dotfiles_dest }}"
    update: true
    accept_hostkey: true
    version: main

- name: Create dotfile symlinks
  become: true
  become_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
  ansible.builtin.file:
    src: "{{ dotfiles_dest }}/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop: "{{ dotfiles_links }}"

