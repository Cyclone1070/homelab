---
- name: Install RPM Fusion Release Packages
  become: true
  ansible.builtin.package:
    name: "{{ base_repo_release_urls }}"
    state: present

- name: Enforce RPM Fusion Repo State
  become: true
  community.general.ini_file:
    path: "/etc/yum.repos.d/{{ item }}.repo"
    section: "{{ item }}"
    option: enabled
    value: "1"
    mode: '0644'
  loop: "{{ base_repos }}"

- name: Install Base Packages
  become: true
  ansible.builtin.package:
    name: "{{ base_packages }}"
    state: present

- name: Enforce stable Intel GuC/HuC state (GuC=2)
  become: true
  ansible.builtin.replace:
    path: /etc/default/grub
    regexp: 'i915\.enable_guc=[0-9]'
    replace: 'i915.enable_guc=2'
  notify:
    - Update GRUB config
    - Reboot host

- name: Enable user lingering for background services
  become: true
  ansible.builtin.command:
    cmd: "loginctl enable-linger {{ ansible_facts['user_id'] }}"
    creates: "/var/lib/systemd/linger/{{ ansible_facts['user_id'] }}"

- name: Install dnf-automatic for security updates
  become: true
  ansible.builtin.package:
    name: dnf-automatic
    state: present
  when: ansible_facts['os_family'] == 'RedHat'

- name: Configure dnf-automatic for security-only updates
  become: true
  community.general.ini_file:
    path: /etc/dnf/automatic.conf
    section: commands
    option: upgrade_type
    value: security
    mode: '0644'
  when: ansible_facts['os_family'] == 'RedHat'

- name: Enable automatic application of updates
  become: true
  community.general.ini_file:
    path: /etc/dnf/automatic.conf
    section: commands
    option: apply_updates
    value: "yes"
    mode: '0644'
  when: ansible_facts['os_family'] == 'RedHat'

- name: Enable and start dnf5-automatic timer
  become: true
  ansible.builtin.systemd:
    name: dnf5-automatic.timer
    state: started
    enabled: true
    daemon_reload: true
  when: ansible_facts['os_family'] == 'RedHat'
