---
- name: Enable RPM Fusion (Free)
  ansible.builtin.package:
    name: "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
    state: present
  become: true

- name: Enable RPM Fusion (Non-Free)
  ansible.builtin.package:
    name: "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
    state: present
  become: true

- name: Install Intel Media Drivers and Utils
  ansible.builtin.package:
    name: "{{ intel_media_packages }}"
    state: present
  become: true

- name: Enforce stable Intel GuC/HuC state (GuC=2)
  ansible.builtin.replace:
    path: /etc/default/grub
    regexp: 'i915\.enable_guc=[0-9]'
    replace: 'i915.enable_guc=2'
  become: true
  notify:
    - Update GRUB config
    - Reboot host

- name: Ensure podman is installed
  ansible.builtin.package:
    name: "{{ podman_package }}"
    state: present
  become: true

- name: Enable user lingering for background services
  become: true
  ansible.builtin.command:
    cmd: "loginctl enable-linger {{ ansible_facts['user_id'] }}"
    creates: "/var/lib/systemd/linger/{{ ansible_facts['user_id'] }}"
